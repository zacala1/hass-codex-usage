name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build integration artifact
        run: python scripts/build_release.py --output release/hass_codex_usage.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/hass_codex_usage.zip
          generate_release_notes: true
